version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - PORT=5001
      - SECRET_KEY=your-secret-key-change-in-production
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
